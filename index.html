<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Hero & Item Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load Chart.js untuk grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Dota 2 Analyzer</h1>
        
        <div class="search-box">
            <input type="text" id="heroSearch" placeholder="Cari nama hero (misal: Axe, PA, Invoker)...">
            <button id="searchBtn">Search</button>
        </div>

        <div id="resultContainer" class="hidden">
            <div class="hero-header">
                <img id="heroImage" src="" alt="Hero Image">
                <div class="hero-identity">
                    <h2 id="heroName"></h2>
                    <span id="heroType"></span>
                </div>
            </div>

            <!-- Bagian Grafik Pick Rate -->
            <div class="chart-container">
                <h3>Popularitas Hero per Rank (Total Pick Patch Ini)</h3>
                <canvas id="rankChart"></canvas>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <h3>Skills</h3>
                    <div id="heroSkills" class="list-content"></div>
                </div>

                <div class="info-card synergy">
                    <h3>Best Synergy (Didukung oleh)</h3>
                    <div id="heroSynergy" class="list-content"></div>
                </div>

                <!-- Counter Hero dengan Foto -->
                <div class="info-card counters">
                    <h3>Countered By (Mudah mati oleh)</h3>
                    <div id="heroCountersImages" class="image-list"></div>
                    <div id="heroCounters" class="list-content" style="margin-top: 10px;"></div>
                </div>

                <!-- Counter Item dengan Foto -->
                <div class="info-card item-counters">
                    <h3>Counter Items (Bikin hero ini gak berguna)</h3>
                    <div id="itemCountersImages" class="image-list"></div>
                    <div id="itemCounters" class="list-content" style="margin-top: 10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
